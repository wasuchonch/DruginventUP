/* ─── Drug name duplicate detection ─── */
function getDupWarnings(){
  /* collect all drugs across all lists */
  var all=[];
  S.RD.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.ED.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.XD.forEach(function(d){all.push({id:d.id,name:d.name.toLowerCase().trim()});});
  S.RECV.forEach(function(r){if(r.drugName) all.push({id:r.drugId||('rv:'+r.id),name:r.drugName.toLowerCase().trim()});});
  /* find names that appear with different IDs — using simple similarity check */
  var warnings={}; /* id -> message */
  for(var i=0;i<all.length;i++){
    for(var j=i+1;j<all.length;j++){
      if(all[i].id!==all[j].id && nameSimilar(all[i].name,all[j].name) && all[i].name!==all[j].name){
        warnings[all[i].id]=(warnings[all[i].id]||[]);
        if(warnings[all[i].id].indexOf(all[j].id)===-1) warnings[all[i].id].push(all[j].id);
        warnings[all[j].id]=(warnings[all[j].id]||[]);
        if(warnings[all[j].id].indexOf(all[i].id)===-1) warnings[all[j].id].push(all[i].id);
      }
      /* exact same name but different IDs */
      if(all[i].id!==all[j].id && all[i].name===all[j].name){
        var key='exact:'+all[i].name;
        warnings[all[i].id]=(warnings[all[i].id]||[]); if(warnings[all[i].id].indexOf(all[j].id)===-1) warnings[all[i].id].push(all[j].id);
        warnings[all[j].id]=(warnings[all[j].id]||[]); if(warnings[all[j].id].indexOf(all[i].id)===-1) warnings[all[j].id].push(all[i].id);
      }
    }
  }
  return warnings;
}
function nameSimilar(a,b){
  /* Levenshtein distance <= 2 for strings longer than 6 chars */
  if(Math.abs(a.length-b.length)>3) return false;
  var d=levDist(a,b);
  return d>0 && d<=2;
}
function levDist(a,b){
  var m=a.length,n=b.length;
  if(m===0||n===0) return m||n;
  if(m>30||n>30) return Math.abs(m-n)>2?99:levDist(a.slice(0,15),b.slice(0,15)); /* cap for performance */
  var dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++){dp[i][j]=0;}}
  for(var j=0;j<=n;j++) dp[0][j]=j;
  for(var i=1;i<=m;i++){for(var j=1;j<=n;j++){dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);}}
  return dp[m][n];
}

  var r2=S.ED.filter(function(x){return x.actions.length===0;});
  var r3=S.XD.filter(function(x){return x.actions.length===0;});
  var r4=S.RECV.filter(function(x){return x.received===null;});
  if(r1.length) sections.push({key:'reorder',title:'&#9888; Reorder / Min / ยาหมดคลัง ที่ยังไม่ดำเนินการ ('+r1.length+' รายการ)',items:r1.map(function(d){return {id:d.id,name:d.name,note:ST_LBL[d.status]+' | คงเหลือ '+d.qty};})});
  if(r2.length) sections.push({key:'nearexp',title:'&#9203; ยาใกล้หมดอายุ ที่ยังไม่ดำเนินการ ('+r2.length+' รายการ)',items:r2.map(function(d){return {id:d.id,name:d.name,note:'หมดอายุ '+d.expDate};})});
  if(r3.length) sections.push({key:'deadstock',title:'&#128230; Dead Stock ที่ยังไม่ดำเนินการ ('+r3.length+' รายการ)',items:r3.map(function(d){return {id:d.id,name:d.name,note:'หมดอายุ '+d.expDate};})});
  if(r4.length) sections.push({key:'recv',title:'&#128666; ยารับเข้า รอดำเนินการ ('+r4.length+' รายการ)',items:r4.map(function(r){return {id:r.drugId||'-',name:r.drugName,note:'วันที่ '+r.arrivalDate+' | Lot '+r.lot};})});
  return sections;
}

  var f=S.rf,drugs=f==='all'?S.RD:S.RD.filter(function(d){return d.status===f;});
  var cnt={all:S.RD.length,reorder:S.RD.filter(function(x){return x.status==='reorder';}).length,min:S.RD.filter(function(x){return x.status==='min';}).length,empty:S.RD.filter(function(x){return x.status==='empty';}).length};
  var fbtns=['all','reorder','min','empty'].map(function(v){return '<button class="btn btn-sm'+(f===v?' btn-blue':'')+'" data-rf="'+v+'">'+(v==='all'?'ทั้งหมด':ST_LBL[v])+' ('+cnt[v]+')</button>';}).join('');

/* ==================== EXP / DEAD STOCK ==================== */
function expH(drugs,lt,f){
  var can=S.user.role!=='viewer',isAdmin=S.user.role==='admin';
  var dup=getDupWarnings();
  var title=lt==='nearexp'?'&#9203; ยาใกล้หมดอายุ':'&#128230; Dead Stock';
  var expId=lt==='nearexp'?'exp-e':'exp-x',fileId=lt==='nearexp'?'fi-e':'fi-x';
  var today=new Date();today.setHours(0,0,0,0);
  var opts=['all','none'].concat(EXP_ACTIONS.map(function(a){return a.id;}));
  var filtered=f==='all'?drugs:f==='none'?drugs.filter(function(d){return d.actions.length===0;}):drugs.filter(function(d){return d.actions.some(function(a){return a.actId===f;});});
  var rows=filtered.map(function(d){
    var ec='#166534',dl='';
    if(d.expDate){var ed=new Date(d.expDate);ed.setHours(0,0,0,0);var dv=Math.ceil((ed-today)/(1000*86400));ec=dv<=0?'#991b1b':dv<=30?'#991b1b':dv<=90?'#92400e':'#166534';dl='<br><small style="color:'+ec+'">'+(dv<=0?'หมดอายุแล้ว':'อีก '+dv+' วัน')+'</small>';}
    var warn=dup[d.id]&&dup[d.id].length>0?'<span class="dup-warn">&#9888; อาจพิมพ์ผิด</span>':'';
    var actSum=d.actions.length?d.actions.map(function(a){
      var hs=a.actId==='exchange_hospital'||a.actId==='exchange_company'||a.actId==='borrow';

/* ==================== RECEIVE ==================== */
function receiveH(){

  var f=S.recvf;
  var filtered=f==='all'?S.RECV:f==='received'?S.RECV.filter(function(r){return r.received===true;}):f==='notreceived'?S.RECV.filter(function(r){return r.received===false;}):S.RECV.filter(function(r){return r.received===null;});
  var rows=filtered.map(function(rv){
    var stBadge=rv.received===true?'<span class="bx b-green">&#10003; รับเข้าแล้ว</span>':
      rv.received===false?'<span class="bx b-orange">&#9888; ยังไม่รับเข้า</span><br><small style="color:#92400e">'+rv.notReceivedReason+(rv.notReceivedOther?' ('+rv.notReceivedOther+')':'')+'</small>':
      '<span class="bx b-gray">รอดำเนินการ</span>';
    var warn=rv.drugId&&dup[rv.drugId]&&dup[rv.drugId].length>0?'<span class="dup-warn">&#9888; อาจพิมพ์ผิด</span>':'';
    return '<tr><td>'+rv.arrivalDate+'</td><td><code>'+(rv.drugId||'-')+'</code></td><td>'+rv.drugName+warn+'</td><td>'+(rv.lot||'-')+'</td><td style="text-align:right;font-weight:bold">'+rv.qty.toLocaleString()+'</td><td>'+stBadge+'</td><td class="no-print">'+(can?'<button class="btn btn-xs" data-edit-recv="'+rv.id+'">&#9998;</button> ':'')+( isAdmin?'<button class="btn btn-xs btn-red" data-del-recv="'+rv.id+'">&#128465;</button>':'')+'</td></tr>';
  }).join('');
  return '<div class="stitle">&#128666; ยารับเข้า</div>'+
  '<div class="toolbar no-print">'+
    (can?'<button class="btn btn-blue" id="btn-add-recv">+ เพิ่มรายการ</button>':'')+
    (can?'<button class="btn" onclick="document.getElementById(\'fi-recv\').click()">&#128196; Import CSV</button><input type="file" id="fi-recv" accept=".csv" style="display:none"><span class="tmpl" data-tmpl="receive">Template</span>':'')+
    '<button class="btn" id="exp-recv">&#128196; Export CSV</button><button class="btn" data-epdf="receive">&#128438; PDF</button>'+
  '</div>'+
  '<div class="toolbar no-print"><span class="flbl">กรอง:</span>'+
    ['all','received','notreceived','pending'].map(function(v){var lbl=v==='all'?'ทั้งหมด':v==='received'?'รับเข้าแล้ว':v==='notreceived'?'ยังไม่รับเข้า':'รอดำเนินการ';return '<button class="btn btn-sm'+(f===v?' btn-blue':'')+'" data-rvf="'+v+'">'+lbl+'</button>';}).join('')+
  '</div>'+
  '<div class="card"><div class="tw"><table><thead><tr><th>วันที่ยามาถึง</th><th>รหัสยา</th><th>ชื่อยา</th><th>Lot</th><th style="text-align:right">จำนวน</th><th>สถานะรับเข้า</th><th class="no-print"></th></tr></thead><tbody>'+

}

  for(var i=0;i<def.length;i++){var s=def[i],done=cur>=s.num;h+='<div class="si'+(done?' done':'')+'"><div class="sh"><div class="sn'+(done?' done':'')+'">'+(done?'&#10003;':s.num)+'</div><span style="font-weight:'+(done?'bold':'normal')+'">'+s.label+'</span></div>';if(done&&s.fields.length){h+='<div style="font-size:12px;color:#444;margin-top:6px;padding-left:32px">';for(var j=0;j<s.fields.length;j++){var f=s.fields[j];if(sd[f.id])h+='<span style="margin-right:10px">'+f.label+': <b>'+sd[f.id]+'</b></span>';}h+='</div>';}h+='</div>';}

  '</div></div>';
}

function mwrap(inner){return '<div class="modal-bg"><div class="modal">'+inner+'</div></div>';}

function stepsH2(steps,cur,sd,sa,fp){
  var h='<div class="step-list">';
  for(var i=0;i<steps.length;i++){
    var s=steps[i],done=cur>=s.num,canDo=cur+1===s.num;
    h+='<div class="si'+(done?' done':'')+'"><div class="sh"><div class="sn'+(done?' done':'')+'">'+(done?'&#10003;':s.num)+'</div><span style="font-weight:'+(done?'bold':'normal')+'">'+s.label+'</span>'+(canDo?'<button class="btn btn-xs btn-green" data-'+sa+'="'+s.num+'" style="margin-left:auto">&#10004; ดำเนินการแล้ว</button>':'')+'</div>';
    if((done||canDo)&&s.fields.length){h+='<div class="sfields">';for(var j=0;j<s.fields.length;j++){var f=s.fields[j];h+='<div class="srow"><label>'+f.label+'</label><input type="'+(f.type||'text')+'" id="'+fp+'-'+f.id+'" placeholder="'+(f.ph||'')+'" value="'+(sd[f.id]||'')+'"></div>';}h+='</div>';}
    h+='</div>';
  }
  return h+'</div>';
}

/* ── BIND MODAL ── */
function bindModal(){
  xb('mcancel',function(){S.modal=null;S.md={};render();});
  document.querySelectorAll('[data-sr]').forEach(function(b){b.onclick=function(){syncM();S.md.sel=b.dataset.sr;render();};});
  document.querySelectorAll('[data-bst]').forEach(function(b){b.onclick=function(){syncM();S.md.bs=parseInt(b.dataset.bst);render();};});
  xb('msaver',function(){syncM();var drug=findById(S.RD,S.md.id);if(!drug)return;drug.action=S.md.sel;drug.reason=S.md.reason||'';drug.borrowStep=S.md.bs||0;drug.stepData=S.md.sd||{};S.modal=null;S.md={};render();});
  xb('msave-drug',function(){
    var lt=S.md.lt,list=lt==='reorder'?S.RD:lt==='nearexp'?S.ED:S.XD;
    for(var i=0;i<list.length;i++){
      if(list[i].id===S.md.drug.id){
        list[i].id=g('ed-id')||list[i].id;list[i].name=g('ed-name')||list[i].name;list[i].qty=parseInt(document.getElementById('ed-qty').value)||0;
        if(lt==='reorder'){list[i].status=g('ed-status');list[i].max=parseInt(document.getElementById('ed-max').value)||0;list[i].reorder=parseInt(document.getElementById('ed-ro').value)||0;list[i].min=parseInt(document.getElementById('ed-min').value)||0;}
        else list[i].expDate=g('ed-exp');
        break;
      }
    }
    S.modal=null;S.md={};render();
  });
  document.querySelectorAll('[data-se]').forEach(function(b){b.onclick=function(){syncM();S.md.sel=b.dataset.se;render();};});
  document.querySelectorAll('[data-est]').forEach(function(b){b.onclick=function(){syncM();S.md.es=parseInt(b.dataset.est);render();};});
  xb('msavee',function(){syncM();var list=S.md.lt==='nearexp'?S.ED:S.XD;var drug=findById(list,S.md.id);if(!drug)return;var a=makeAction(S.md.sel);a.responsible=S.md.responsible||'';a.actionDate=S.md.actionDate||'';a.note=S.md.note||'';a.exchangeStep=S.md.es||0;a.stepData=S.md.sd||{};drug.actions.push(a);S.modal=null;S.md={};render();});
  xb('rv-yes',function(){syncRv();S.md.received=true;render();});
  xb('rv-no',function(){syncRv();S.md.received=false;render();});
  var rr=document.getElementById('rv-reason');if(rr)rr.onchange=function(){syncRv();if(this.value==='อื่นๆ')render();};
  xb('msave-rv',function(){
    syncRv();var err=document.getElementById('rverr');
    if(S.md.received===null){err.textContent='กรุณาเลือกสถานะ';return;}
    if(S.md.received===false&&!S.md.notReceivedReason){err.textContent='กรุณาระบุเหตุผล';return;}
    if(S.modal==='edit-recv'){for(var i=0;i<S.RECV.length;i++){if(S.RECV[i].id===S.md.id){S.RECV[i]=JSON.parse(JSON.stringify(S.md));break;}}}
    else S.RECV.push(makeRecv(S.md));
    S.modal=null;S.md={};render();
  });
  xb('msave-user',function(){var name=g('nu-name'),uname=g('nu-uname'),pass=g('nu-pass'),email=g('nu-email'),role=g('nu-role');var err=document.getElementById('uerr');if(!name||!uname||!pass){err.textContent='กรุณากรอกชื่อ, username และรหัสผ่าน';return;}if(S.users.find(function(u){return u.username===uname;})){err.textContent='Username ถูกใช้แล้ว';return;}S.users.push({id:uid(),username:uname,password:pass,role:role,name:name,email:email});S.modal=null;S.md={};render();});
  xb('msave-eu',function(){var name=g('eu-name'),uname=g('eu-uname'),pass=g('eu-pass'),email=g('eu-email'),role=g('eu-role');var err=document.getElementById('uerr');if(!name||!uname){err.textContent='กรุณากรอกชื่อและ username';return;}if(S.users.find(function(u){return u.username===uname&&u.id!==S.md.uid;})){err.textContent='Username ถูกใช้แล้ว';return;}for(var i=0;i<S.users.length;i++){if(S.users[i].id===S.md.uid){S.users[i].name=name;S.users[i].username=uname;S.users[i].email=email;S.users[i].role=role;if(pass)S.users[i].password=pass;if(S.user.id===S.md.uid)S.user=S.users[i];break;}}S.modal=null;S.md={};render();});
  /* report preview section toggles */
  document.querySelectorAll('[data-toggle-section]').forEach(function(b){b.onclick=function(){var body=document.getElementById('rsb-'+b.dataset.toggleSection);if(body){body.classList.toggle('open');var a=b.querySelector('.rsc-arrow');if(a)a.innerHTML=body.classList.contains('open')?'&#9650;':'&#9660;';}};});
}

function g(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function syncM(){function v(id){var el=document.getElementById(id);return el?el.value:undefined;}var r=v('mreason');if(r!==undefined)S.md.reason=r;var rp=v('mresp');if(rp!==undefined)S.md.responsible=rp;var dt=v('mdate');if(dt!==undefined)S.md.actionDate=dt;var en=v('menote');if(en!==undefined)S.md.note=en;var sd=S.md.sd||{};document.querySelectorAll('[id^="bsf-"],[id^="esf-"]').forEach(function(inp){sd[inp.id.replace('bsf-','').replace('esf-','')]=inp.value;});S.md.sd=sd;}
function syncRv(){function v(id){var el=document.getElementById(id);return el?el.value:undefined;}var d=v('rv-date');if(d!==undefined)S.md.arrivalDate=d;var i=v('rv-id');if(i!==undefined)S.md.drugId=i;var n=v('rv-name');if(n!==undefined)S.md.drugName=n;var l=v('rv-lot');if(l!==undefined)S.md.lot=l;var q=v('rv-qty');if(q!==undefined)S.md.qty=parseInt(q)||0;var rs=v('rv-reason');if(rs!==undefined)S.md.notReceivedReason=rs;var ro=v('rv-other');if(ro!==undefined)S.md.notReceivedOther=ro;}

/* ===================== CSV & UTILS ===================== */
function findById(arr,id){for(var i=0;i<arr.length;i++){if(arr[i].id===id)return arr[i];}return null;}
function doExportCSV(data,fn){if(!data.length){alert('ไม่มีข้อมูล');return;}var skip=['stepData','actions'];var keys=Object.keys(data[0]).filter(function(k){return !skip.includes(k)&&typeof data[0][k]!=='object';});var csv=[keys.join(',')].concat(data.map(function(r){return keys.map(function(k){return '"'+(r[k]!=null?r[k]:'')+'\"';}).join(',');})).join('\n');dl('data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv),fn);}

function handleCSV(e,type){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    var lines=ev.target.result.trim().split('\n');
    if(lines.length<2){alert('ไฟล์ไม่มีข้อมูล');return;}
    var headers=lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
    var rows=[];
    for(var i=1;i<lines.length;i++){if(!lines[i].trim())continue;var vals=lines[i].split(',').map(function(v){return v.trim().replace(/^"|"$/g,'');});var o={};for(var j=0;j<headers.length;j++)o[headers[j]]=vals[j]||'';rows.push(o);}
    var cnt=0;
    if(type==='reorder'){rows.forEach(function(o){var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;var ex=findById(S.RD,id);if(ex){ex.name=o['ชื่อยา']||o['name']||ex.name;ex.qty=ii(o['จำนวน']||o['qty'],ex.qty);if(o['max'])ex.max=parseInt(o['max']);if(o['reorder_point']||o['reorder'])ex.reorder=parseInt(o['reorder_point']||o['reorder']);if(o['min'])ex.min=parseInt(o['min']);if(o['status'])ex.status=o['status'];}else S.RD.push(makeDrug({id:id,name:o['ชื่อยา']||o['name']||'',qty:parseInt(o['จำนวน']||o['qty'])||0,max:parseInt(o['max'])||0,reorder:parseInt(o['reorder_point']||o['reorder'])||0,min:parseInt(o['min'])||0,status:o['status']||'reorder'}));cnt++;});}
    else if(type==='levels'){rows.forEach(function(o){var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;S.drugLevels[id]={name:o['ชื่อยา']||o['name']||'',max:parseInt(o['max'])||0,reorder:parseInt(o['reorder_point']||o['reorder'])||0,min:parseInt(o['min'])||0};var d=findById(S.RD,id);if(d){d.max=S.drugLevels[id].max;d.reorder=S.drugLevels[id].reorder;d.min=S.drugLevels[id].min;}cnt++;});}
    else if(type==='receive'){rows.forEach(function(o){S.RECV.push(makeRecv({id:uid(),arrivalDate:o['วันที่ยามาถึง']||o['arrival_date']||'',drugId:o['รหัสยา']||o['drug_id']||'',drugName:o['ชื่อยา']||o['name']||'',lot:o['lot']||o['Lot']||'',qty:parseInt(o['จำนวน']||o['qty'])||0,received:null,notReceivedReason:'',notReceivedOther:''}));cnt++;});}
    else{var arr=type==='nearexp'?S.ED:S.XD;rows.forEach(function(o){var id=(o['รหัสยา']||o['drug_id']||'').trim();if(!id)return;var ex=findById(arr,id);if(ex){ex.name=o['ชื่อยา']||o['name']||ex.name;ex.qty=ii(o['จำนวน']||o['qty'],ex.qty);ex.expDate=o['วันหมดอายุ']||o['exp_date']||ex.expDate;}else arr.push(makeDrug({id:id,name:o['ชื่อยา']||o['name']||'',qty:parseInt(o['จำนวน']||o['qty'])||0,expDate:o['วันหมดอายุ']||o['exp_date']||''}));cnt++;});}
    /* check dups after import */
    var dups=getDupWarnings();var dupIds=Object.keys(dups);
    var msg='อัพเดทข้อมูล '+cnt+' รายการแล้ว';
    if(dupIds.length) msg+='\n\n⚠️ พบชื่อยาคล้ายกัน '+dupIds.length+' รายการ — กรุณาตรวจสอบ';
    alert(msg);e.target.value='';render();
  };
  reader.readAsText(file,'utf-8');
}
function ii(v,fb){var n=parseInt(v);return isNaN(n)?fb:n;}

function downloadTemplate(type){
  var csv='';
  if(type==='reorder')   csv='รหัสยา,ชื่อยา,จำนวน,max,reorder_point,min,status\n1000011,ยาตัวอย่าง A,100,2000,300,150,reorder\n1000012,ยาตัวอย่าง B,0,500,100,50,empty';
  else if(type==='levels') csv='รหัสยา,ชื่อยา,max,reorder_point,min\n1000001,Paracetamol 500 mg,2000,300,150\n1000002,Amoxicillin 500 mg,800,200,80';
  else if(type==='nearexp') csv='รหัสยา,ชื่อยา,จำนวน,วันหมดอายุ\n2000009,ยาตัวอย่าง C,48,2025-06-30';
  else if(type==='deadstock') csv='รหัสยา,ชื่อยา,จำนวน,วันหมดอายุ\n3000007,ยาตัวอย่าง D,200,2026-03-01';
  else if(type==='receive') csv='วันที่ยามาถึง,รหัสยา,ชื่อยา,lot,จำนวน\n2025-04-10,1000001,Paracetamol 500 mg,LOT2501A,200\n2025-04-10,,Amoxicillin 500 mg,LOT2502B,100';
  dl('data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv),'template_'+type+'.csv');
}

function dl(href,fn){var a=document.createElement('a');a.href=href;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);}

function doPDF(section){
  var prev=S.tab;S.tab=section;S.modal=null;render();
  var titles={dashboard:'ภาพรวม',reorder:'Reorder/Min/หมดคลัง',nearexp:'ยาใกล้หมดอายุ',deadstock:'Dead Stock',receive:'ยารับเข้า'};
  setTimeout(function(){document.title=titles[section]||'รายงาน';window.print();document.title='ระบบจัดการยา';S.tab=prev;render();},300);
}
